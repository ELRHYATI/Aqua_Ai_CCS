version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: azura_aqua_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: azura_aqua
    ports:
      - "5432:5432"
    volumes:
      - azura_aqua_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  azura_aqua_pgdata:
